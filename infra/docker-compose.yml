## Steadfirm Infrastructure
## Underlying self-hosted services that Steadfirm orchestrates.
## All services share a single Postgres instance and a common Docker network.
## Usage: docker compose up -d

services:
  # ──────────────────────────────────────────────
  # Core infrastructure
  # ──────────────────────────────────────────────

  postgres:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-steadfirm}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
      POSTGRES_DB: steadfirm
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "127.0.0.1:18432:5432"
    shm_size: 128mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-steadfirm}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - steadfirm

  valkey:
    image: docker.io/valkey/valkey:9.0.3-alpine
    restart: unless-stopped
    volumes:
      - valkey_data:/data
    ports:
      - "127.0.0.1:18379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - steadfirm

  # ──────────────────────────────────────────────
  # Authentication — BetterAuth (Bun sidecar)
  # ──────────────────────────────────────────────

  betterauth:
    build:
      context: ../services/betterauth
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      BETTER_AUTH_SECRET: ${BETTERAUTH_SECRET:?Set BETTERAUTH_SECRET}
      BETTER_AUTH_URL: ${BETTERAUTH_URL:-http://localhost:18080}
      BETTER_AUTH_DATABASE: postgresql://${DB_USER:-steadfirm}:${DB_PASSWORD}@postgres:5432/steadfirm
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:?Set WEBHOOK_SECRET}
      BACKEND_INTERNAL_URL: http://steadfirm-backend:3001
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No host ports — only reachable via Caddy (/api/auth/*) and internal network
    networks:
      - steadfirm

  # ──────────────────────────────────────────────
  # Steadfirm backend
  # ──────────────────────────────────────────────

  steadfirm-backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:-steadfirm}:${DB_PASSWORD}@postgres:5432/steadfirm
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD}
      BETTERAUTH_URL: http://betterauth:3002
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:?Set WEBHOOK_SECRET}
      IMMICH_URL: http://immich-server:2283
      JELLYFIN_URL: http://jellyfin:8096
      PAPERLESS_URL: http://paperless:8000
      AUDIOBOOKSHELF_URL: http://audiobookshelf:80
      KAVITA_URL: http://kavita:5000
      FILES_STORAGE_PATH: /data/steadfirm/files
    volumes:
      - steadfirm_files:/data/steadfirm/files
    depends_on:
      postgres:
        condition: service_healthy
      betterauth:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No host ports — only reachable via Caddy (/api/*)
    networks:
      - steadfirm

  # ──────────────────────────────────────────────
  # Photos & Videos — Immich
  # ──────────────────────────────────────────────

  immich-server:
    image: ghcr.io/immich-app/immich-server:v2.5.6
    restart: unless-stopped
    environment:
      DB_HOSTNAME: postgres
      DB_USERNAME: ${DB_USER:-steadfirm}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE_NAME: immich
      REDIS_HOSTNAME: valkey
    volumes:
      - immich_upload:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    # No host ports — only reachable by steadfirm-backend via internal network
    networks:
      - steadfirm

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:v2.5.6
    restart: unless-stopped
    volumes:
      - immich_ml_cache:/cache
    networks:
      - steadfirm

  # ──────────────────────────────────────────────
  # Media — Jellyfin
  # ──────────────────────────────────────────────

  jellyfin:
    image: docker.io/jellyfin/jellyfin:10.11.6
    restart: unless-stopped
    volumes:
      - jellyfin_config:/config
      - jellyfin_cache:/cache
      - media_library:/media
    # No host ports — only reachable by steadfirm-backend via internal network
    networks:
      - steadfirm

  # ──────────────────────────────────────────────
  # Documents — Paperless-ngx + Tika/Gotenberg
  # ──────────────────────────────────────────────

  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:2.20.10
    restart: unless-stopped
    environment:
      PAPERLESS_DBHOST: postgres
      PAPERLESS_DBUSER: ${DB_USER:-steadfirm}
      PAPERLESS_DBPASS: ${DB_PASSWORD}
      PAPERLESS_DBNAME: paperless
      PAPERLESS_REDIS: redis://valkey:6379
      PAPERLESS_OCR_LANGUAGE: eng
      PAPERLESS_URL: http://paperless:8000
      PAPERLESS_ADMIN_USER: admin
      PAPERLESS_ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD}
      # Enable Tika/Gotenberg for office document conversion (docx, xlsx, pptx, odt, etc.)
      PAPERLESS_TIKA_ENABLED: 1
      PAPERLESS_TIKA_ENDPOINT: http://tika:9998
      PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://gotenberg:3000
    volumes:
      - paperless_data:/usr/src/paperless/data
      - paperless_media:/usr/src/paperless/media
      - paperless_consume:/usr/src/paperless/consume
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      gotenberg:
        condition: service_started
      tika:
        condition: service_started
    # No host ports — only reachable by steadfirm-backend via internal network
    networks:
      - steadfirm

  gotenberg:
    image: docker.io/gotenberg/gotenberg:8.21.0
    restart: unless-stopped
    # Gotenberg runs Chromium + LibreOffice to convert office docs to PDF.
    # Disable unused modules to reduce attack surface and resource usage.
    command:
      - gotenberg
      - --chromium-disable-javascript=true
      - --chromium-allow-list=file:///tmp/.*
    networks:
      - steadfirm

  tika:
    image: docker.io/apache/tika:3.1.0.0
    restart: unless-stopped
    networks:
      - steadfirm

  # ──────────────────────────────────────────────
  # Audiobooks — Audiobookshelf
  # ──────────────────────────────────────────────

  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:2.32.1
    restart: unless-stopped
    volumes:
      - audiobooks_library:/audiobooks
      - audiobookshelf_config:/config
      - audiobookshelf_metadata:/metadata
    # No host ports — only reachable by steadfirm-backend via internal network
    networks:
      - steadfirm

  # ──────────────────────────────────────────────
  # Reading — Kavita (ebooks, comics, manga)
  # ──────────────────────────────────────────────

  kavita:
    image: ghcr.io/kareadita/kavita:latest
    restart: unless-stopped
    volumes:
      - kavita_library:/books
      - kavita_config:/kavita/config
    environment:
      - TZ=UTC
    # No host ports — only reachable by steadfirm-backend via internal network
    networks:
      - steadfirm

  # ──────────────────────────────────────────────
  # Reverse Proxy — Caddy
  # ──────────────────────────────────────────────

  caddy:
    image: docker.io/caddy:2.11.2-alpine
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "18080:80"
      - "18443:443"
    depends_on:
      steadfirm-backend:
        condition: service_healthy
      betterauth:
        condition: service_healthy
    networks:
      - steadfirm

volumes:
  postgres_data:
  valkey_data:
  immich_upload:
  immich_ml_cache:
  jellyfin_config:
  jellyfin_cache:
  media_library:
  paperless_data:
  paperless_media:
  paperless_consume:
  audiobooks_library:
  audiobookshelf_config:
  audiobookshelf_metadata:
  kavita_library:
  kavita_config:
  steadfirm_files:
  caddy_data:
  caddy_config:

networks:
  steadfirm:
    driver: bridge
