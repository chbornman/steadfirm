## Steadfirm Infrastructure
## Underlying self-hosted services that Steadfirm orchestrates.
## All services share a single Postgres instance and a common Docker network.

services:
  # ──────────────────────────────────────────────
  # Core infrastructure
  # ──────────────────────────────────────────────

  postgres:
    image: tensorchord/pgvecto-rs:pg16-v0.2.1
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-steadfirm}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
      POSTGRES_DB: steadfirm
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-steadfirm}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - steadfirm

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - steadfirm

  # ──────────────────────────────────────────────
  # Steadfirm backend
  # ──────────────────────────────────────────────

  # steadfirm-backend:
  #   build:
  #     context: ..
  #     dockerfile: infra/Dockerfile.backend
  #   restart: unless-stopped
  #   env_file: .env
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   ports:
  #     - "127.0.0.1:3001:3001"
  #   networks:
  #     - steadfirm

  # ──────────────────────────────────────────────
  # Photos & Videos — Immich
  # ──────────────────────────────────────────────

  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    restart: unless-stopped
    environment:
      DB_HOSTNAME: postgres
      DB_USERNAME: ${DB_USER:-steadfirm}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE_NAME: immich
      REDIS_HOSTNAME: redis
    volumes:
      - immich_upload:/usr/src/app/upload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:2283:2283"
    networks:
      - steadfirm

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:release
    restart: unless-stopped
    volumes:
      - immich_ml_cache:/cache
    networks:
      - steadfirm

  # ──────────────────────────────────────────────
  # Media — Jellyfin
  # ──────────────────────────────────────────────

  jellyfin:
    image: jellyfin/jellyfin:latest
    restart: unless-stopped
    volumes:
      - jellyfin_config:/config
      - jellyfin_cache:/cache
      - media_library:/media
    ports:
      - "127.0.0.1:8096:8096"
    networks:
      - steadfirm

  # ──────────────────────────────────────────────
  # Documents — Paperless-ngx
  # ──────────────────────────────────────────────

  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    restart: unless-stopped
    environment:
      PAPERLESS_DBHOST: postgres
      PAPERLESS_DBUSER: ${DB_USER:-steadfirm}
      PAPERLESS_DBPASS: ${DB_PASSWORD}
      PAPERLESS_DBNAME: paperless
      PAPERLESS_REDIS: redis://redis:6379
      PAPERLESS_OCR_LANGUAGE: eng
      PAPERLESS_URL: ${PAPERLESS_URL:-http://localhost:8000}
    volumes:
      - paperless_data:/usr/src/paperless/data
      - paperless_media:/usr/src/paperless/media
      - paperless_consume:/usr/src/paperless/consume
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - steadfirm

  # ──────────────────────────────────────────────
  # Audiobooks — Audiobookshelf
  # ──────────────────────────────────────────────

  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    restart: unless-stopped
    volumes:
      - audiobooks_library:/audiobooks
      - audiobookshelf_config:/config
      - audiobookshelf_metadata:/metadata
    ports:
      - "127.0.0.1:13378:80"
    networks:
      - steadfirm

  # ──────────────────────────────────────────────
  # Reverse Proxy — Caddy
  # ──────────────────────────────────────────────

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - immich-server
      - jellyfin
      - paperless
      - audiobookshelf
    networks:
      - steadfirm

volumes:
  postgres_data:
  redis_data:
  immich_upload:
  immich_ml_cache:
  jellyfin_config:
  jellyfin_cache:
  media_library:
  paperless_data:
  paperless_media:
  paperless_consume:
  audiobooks_library:
  audiobookshelf_config:
  audiobookshelf_metadata:
  steadfirm_files:
  caddy_data:
  caddy_config:

networks:
  steadfirm:
    driver: bridge
